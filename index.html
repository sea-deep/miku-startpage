<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Startpage</title>
    <!-- Miku Teal Home Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg fill='%2339c5bb' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Search Bar -->
        <div class="search-wrapper">
            <form action="https://www.google.com/search" method="get" class="search-form">
                <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="search" name="q" id="search-input" placeholder="Search the web..." autocomplete="off" autofocus required>
                <button type="submit" class="search-submit">Search</button>
            </form>
            <div id="suggestions"></div>
        </div>

        <!-- Bookmarks Grid -->
        <section class="links">
            <a class="link-card" href="https://chat.openai.com/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/chatgpt.svg'); -webkit-mask-image: url('assets/icons/chatgpt.svg');"></div>
                <span class="card-title">ChatGPT</span>
            </a>
            
            <a class="link-card" href="https://gemini.google.com/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/gemini.svg'); -webkit-mask-image: url('assets/icons/gemini.svg');"></div>
                <span class="card-title">Gemini</span>
            </a>
            
            <a class="link-card" href="https://web.telegram.org/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/telegram.svg'); -webkit-mask-image: url('assets/icons/telegram.svg');"></div>
                <span class="card-title">Telegram</span>
            </a>
            
            <a class="link-card" href="https://mail.google.com/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/gmail.svg'); -webkit-mask-image: url('assets/icons/gmail.svg');"></div>
                <span class="card-title">Gmail</span>
            </a>
            
            <a class="link-card" href="https://mail.proton.me/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/proton.svg'); -webkit-mask-image: url('assets/icons/proton.svg');"></div>
                <span class="card-title">Proton</span>
            </a>
            
            <a class="link-card" href="https://reddit.com/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/reddit.svg'); -webkit-mask-image: url('assets/icons/reddit.svg');"></div>
                <span class="card-title">Reddit</span>
            </a>
            
            <a class="link-card" href="https://railway.app/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/railway.svg'); -webkit-mask-image: url('assets/icons/railway.svg');"></div>
                <span class="card-title">Railway</span>
            </a>
            
            <a class="link-card" href="https://github.com/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/github.svg'); -webkit-mask-image: url('assets/icons/github.svg');"></div>
                <span class="card-title">GitHub</span>
            </a>
            
            <a class="link-card" href="https://discord.com/app" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/discord.svg'); -webkit-mask-image: url('assets/icons/discord.svg');"></div>
                <span class="card-title">Discord</span>
            </a>
            
            <a class="link-card" href="https://monkeytype.com/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/monkeytype.svg'); -webkit-mask-image: url('assets/icons/monkeytype.svg');"></div>
                <span class="card-title">Monkeytype</span>
            </a>
            
            <a class="link-card" href="https://docs.google.com/document/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/google-docs.svg'); -webkit-mask-image: url('assets/icons/google-docs.svg');"></div>
                <span class="card-title">Google Docs</span>
            </a>
            
            <a class="link-card" href="https://docs.google.com/presentation/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/google-slides.svg'); -webkit-mask-image: url('assets/icons/google-slides.svg');"></div>
                <span class="card-title">Google Slides</span>
            </a>
            
            <a class="link-card" href="https://www.linkedin.com/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/linkedin.svg'); -webkit-mask-image: url('assets/icons/linkedin.svg');"></div>
                <span class="card-title">LinkedIn</span>
            </a>
            
            <a class="link-card" href="https://www.fiverr.com/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/fiverr.svg'); -webkit-mask-image: url('assets/icons/fiverr.svg');"></div>
                <span class="card-title">Fiverr</span>
            </a>
            
            <a class="link-card" href="https://youtube.com/" target="_blank" rel="noreferrer">
                <div class="site-icon" style="mask-image: url('assets/icons/youtube.svg'); -webkit-mask-image: url('assets/icons/youtube.svg');"></div>
                <span class="card-title">YouTube</span>
            </a>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
