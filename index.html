<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Startpage</title>
    <!-- Miku Teal Home Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg fill='%2339c5bb' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        
        <header class="hero-header">
            <h1 class="hero-title">ミク<span class="highlight">_</span></h1>
        </header>

        <!-- Search Bar -->
        <div class="search-wrapper">
            <form action="https://www.google.com/search" method="get" class="search-form" id="search-form">
                <div class="engine-selector" id="engine-selector" tabindex="0" title="Select Search Engine">
                    <span id="current-engine-label">G</span>
                    <div class="engine-dropdown" id="engine-dropdown"></div>
                </div>
                <input type="search" name="q" id="search-input" placeholder="Search the web..." autocomplete="off" autofocus required>
                <button type="submit" class="search-submit">Search</button>
            </form>
            <div id="suggestions"></div>
        </div>

        <!-- Bookmarks Grid -->
        <section class="links">
            <a class="link-card" href="https://chat.openai.com/" target="_blank" rel="noreferrer">
                <span class="card-index">01</span>
                <img class="site-icon" src="assets/icons/chatgpt.svg" alt="ChatGPT">
                <span class="card-title">ChatGPT</span>
            </a>
            
            <a class="link-card" href="https://gemini.google.com/" target="_blank" rel="noreferrer">
                <span class="card-index">02</span>
                <img class="site-icon" src="assets/icons/gemini.svg" alt="Gemini">
                <span class="card-title">Gemini</span>
            </a>
            
            <a class="link-card" href="https://web.telegram.org/" target="_blank" rel="noreferrer">
                <span class="card-index">03</span>
                <img class="site-icon" src="assets/icons/telegram.svg" alt="Telegram">
                <span class="card-title">Telegram</span>
            </a>
            
            <a class="link-card" href="https://mail.google.com/" target="_blank" rel="noreferrer">
                <span class="card-index">04</span>
                <img class="site-icon" src="assets/icons/gmail.svg" alt="Gmail">
                <span class="card-title">Gmail</span>
            </a>
            
            <a class="link-card" href="https://mail.proton.me/" target="_blank" rel="noreferrer">
                <span class="card-index">05</span>
                <img class="site-icon" src="assets/icons/proton.svg" alt="Proton">
                <span class="card-title">Proton</span>
            </a>
            
            <a class="link-card" href="https://reddit.com/" target="_blank" rel="noreferrer">
                <span class="card-index">06</span>
                <img class="site-icon" src="assets/icons/reddit.svg" alt="Reddit">
                <span class="card-title">Reddit</span>
            </a>
            
            <a class="link-card" href="https://railway.app/" target="_blank" rel="noreferrer">
                <span class="card-index">07</span>
                <img class="site-icon" src="assets/icons/railway.svg" alt="Railway">
                <span class="card-title">Railway</span>
            </a>
            
            <a class="link-card" href="https://github.com/" target="_blank" rel="noreferrer">
                <span class="card-index">08</span>
                <img class="site-icon" src="assets/icons/github.svg" alt="GitHub">
                <span class="card-title">GitHub</span>
            </a>
            
            <a class="link-card" href="https://discord.com/app" target="_blank" rel="noreferrer">
                <span class="card-index">09</span>
                <img class="site-icon" src="assets/icons/discord.svg" alt="Discord">
                <span class="card-title">Discord</span>
            </a>
            
            <a class="link-card" href="https://monkeytype.com/" target="_blank" rel="noreferrer">
                <span class="card-index">10</span>
                <img class="site-icon" src="assets/icons/monkeytype.svg" alt="Monkeytype">
                <span class="card-title">Monkeytype</span>
            </a>
            
            <a class="link-card" href="https://docs.google.com/document/" target="_blank" rel="noreferrer">
                <span class="card-index">11</span>
                <img class="site-icon" src="assets/icons/google-docs.svg" alt="Google Docs">
                <span class="card-title">Google Docs</span>
            </a>
            
            <a class="link-card" href="https://docs.google.com/presentation/" target="_blank" rel="noreferrer">
                <span class="card-index">12</span>
                <img class="site-icon" src="assets/icons/google-slides.svg" alt="Google Slides">
                <span class="card-title">Google Slides</span>
            </a>
            
            <a class="link-card" href="https://www.linkedin.com/" target="_blank" rel="noreferrer">
                <span class="card-index">13</span>
                <img class="site-icon" src="assets/icons/linkedin.svg" alt="LinkedIn">
                <span class="card-title">LinkedIn</span>
            </a>
            
            <a class="link-card" href="https://www.fiverr.com/" target="_blank" rel="noreferrer">
                <span class="card-index">14</span>
                <img class="site-icon" src="assets/icons/fiverr.svg" alt="Fiverr">
                <span class="card-title">Fiverr</span>
            </a>
            
            <a class="link-card" href="https://youtube.com/" target="_blank" rel="noreferrer">
                <span class="card-index">15</span>
                <img class="site-icon" src="assets/icons/youtube.svg" alt="YouTube">
                <span class="card-title">YouTube</span>
            </a>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
